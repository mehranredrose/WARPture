appId: com.mehranredrose.warpture
productName: WARPture
copyright: Copyright © 2025 mehranredrose

directories:
  output: dist

files:
  - build/**/*
  - electron/**/*
  - assets/**/*
  - resources/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: resources/tunnel-agent
    to: tunnel-agent
  - from: resources/process-monitor
    to: process-monitor

extraMetadata:
  main: electron/main.js

mac:
  category: public.app-category.utilities
  icon: assets/icon.icns
  target:
    - target: dmg
      arch: arm64
    - target: dmg
      arch: x64

linux:
  icon: assets/icon.png
  category: Utility
  target:
    - target: deb
      arch: x64
    - target: AppImage
      arch: x64

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: x64

dmg:
  title: WARPture ${version}