name: Build & Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        working-directory: services/warp-gui
        run: npm install --legacy-peer-deps
      - name: Build Windows
        working-directory: services/warp-gui
        run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: services/warp-gui/dist/*.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
